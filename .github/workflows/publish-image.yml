name: Publish DevKit Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-devkit-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/yuneysi/java-agentic-devkit
  IMAGE_MINOR_VERSION: "0.1"

jobs:
  publish:
    name: Build and publish image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image version
        id: version
        run: |
          echo "minor=${IMAGE_MINOR_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "patch=${IMAGE_MINOR_VERSION}.${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"

      - name: Build and push versioned image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.minor }}
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.patch }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.title=java-agentic-devkit
            org.opencontainers.image.description=Docker-based Java development kit for Java 8, Java 21, and Java 8 to Java 21 migrations.
            org.opencontainers.image.authors=Yuneysi Gerat Gil
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/yuneysi/java-agentic-devkit
            org.opencontainers.image.version=${{ steps.version.outputs.patch }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
